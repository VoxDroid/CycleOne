name: CycleOne CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Test
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Install dependencies
        run: |
          brew install swiftlint swiftformat pre-commit
          pre-commit install

      - name: Run Checks (Lint)
        run: make check

      - name: Run Tests
        run: make test
